<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Seguimiento de Equipo | SGOL-IT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="container" style="max-width: 400px;">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-primary">SGOL-IT</h2>
            <p class="text-muted">Portal de Autogestión para Clientes</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} shadow-sm text-center fw-bold">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <div class="card shadow-lg border-0">
            <div class="card-body p-4">
                <form action="/tracking" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">DNI / CUIL</label>
                        <input type="text" name="dni" class="form-control" placeholder="Ingrese su DNI" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Contraseña Web</label>
                        <input type="password" name="password_web" class="form-control" placeholder="Entregada en recepción" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold">INGRESAR A MI PORTAL</button>
                </form>
            </div>
        </div>
        <div class="text-center mt-3">
            <a href="/" class="text-muted text-decoration-none small">Soy personal del laboratorio (Login Interno)</a>
        </div>
    </div>
</body>
</html>
