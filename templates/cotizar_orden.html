<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cotizar Orden | SGOL-IT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold">💵 Armar Presupuesto</h2>
                    <a href="/presupuestos_pendientes" class="btn btn-secondary btn-sm">Volver a la Lista</a>
                </div>

                <div class="card shadow border-0">
                    <div class="card-body p-4">
                        <div class="alert alert-secondary mb-4">
                            <strong>Orden #{{ orden.id_orden }}</strong> | Ticket: <span class="badge bg-dark">{{ orden.codigo }}</span><br>
                            <strong>Equipo:</strong> <span class="text-primary fw-bold">{{ orden.equipo }}</span>
                        </div>

                        <div class="mb-4">
                            <h5 class="fw-bold text-danger border-bottom pb-2">📋 Informe del Técnico:</h5>
                            <div class="p-3 bg-white border rounded shadow-sm fst-italic text-dark">
                                "{{ orden.diagnostico }}"
                            </div>
                        </div>

                        <form action="/cotizar_orden/{{ orden.id_orden }}" method="POST">
                            <div class="mb-4">
                                <label class="form-label fw-bold text-success">Monto Total a Cotizar ($):</label>
                                <input type="number" step="0.01" min="0" class="form-control form-control-lg text-success fw-bold" name="monto" placeholder="Ej: 15000.00" required>
                                <small class="text-muted">Este es el precio final que el cliente verá en su portal web.</small>
                            </div>

                            <button type="submit" class="btn btn-success btn-lg w-100 fw-bold">GUARDAR Y ENVIAR AL CLIENTE</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
