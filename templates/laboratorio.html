<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Laboratorio | SGOL-IT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">🛠️ Laboratorio Técnico</h2>
            <a href="/dashboard" class="btn btn-secondary">Panel de Control</a>
        </div>

        <div class="card shadow border-0">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th class="ps-4">Ticket</th>
                            <th>Equipo</th>
                            <th>Estado</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for t in trabajos %}
                        <tr class="align-middle">
                            <td class="ps-4"><span class="badge bg-secondary">{{ t.codigo }}</span></td>
                            <td>{{ t.equipo }}</td>
                            <td>
                                <span class="badge {{ 'bg-danger' if t.estado == 'Para Revisión' else 'bg-info' }}">
                                    {{ t.estado }}
                                </span>
                            </td>
                            <td class="text-center">
                                <button class="btn btn-sm btn-success px-4">Gestionar</button>
                                <a href="/gestionar_orden/{{ t.id_orden }}" class="btn btn-sm btn-success px-4">Gestionar</a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
                {% if not trabajos %}
                    <div class="p-5 text-center text-muted">No hay trabajos pendientes de diagnóstico o reparación.</div>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
