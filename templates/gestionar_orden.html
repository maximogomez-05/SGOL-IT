<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestionar Orden | SGOL-IT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold">👨‍🔧 Diagnóstico Técnico</h2>
                    <a href="/laboratorio" class="btn btn-secondary btn-sm">Volver al Laboratorio</a>
                </div>

                <div class="card shadow border-0">
                    <div class="card-body p-4">
                        <div class="alert alert-info mb-4">
                            <strong>Orden #{{ orden.id_orden }}</strong> | Ticket: <span class="badge bg-dark">{{ orden.codigo }}</span><br>
                            <strong>Equipo:</strong> {{ orden.equipo }}<br>
                            <strong>Estado Actual:</strong> {{ orden.estado }}
                        </div>

                        <form action="/gestionar_orden/{{ orden.id_orden }}" method="POST">
                            
                            <div class="mb-4">
                                <label class="form-label fw-bold text-primary">Informe Técnico y Repuestos Necesarios:</label>
                                <textarea class="form-control" name="diagnostico" rows="5" placeholder="Escriba el diagnóstico detallado para que Recepción pueda armar el presupuesto..." required></textarea>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">ENVIAR INFORME A RECEPCIÓN</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
